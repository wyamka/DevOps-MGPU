name: Diabetes ETL Smoke Test Pipeline

on:
  push:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t diabetes-etl:smoke .

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name etl-smoke diabetes-etl:smoke
          sleep 5  # ждем, пока FastAPI поднимется

      - name: Smoke test (health check)
        run: curl -f http://localhost:8000/health

      - name: Run Pytest inside container
        run: |
          docker exec etl-smoke pytest --maxfail=1 --disable-warnings -q